# Layer G held-out task set v0 — 10 tasks NOT in the 108-fixture corpus.
# Each task targets a specific catalogued pitfall so we can measure pass-rate
# lift when that pitfall is in/out of the catalog the LLM sees.
#
# Schema per task:
#   id              — kebab-case unique identifier
#   backend         — which FEM backend the LLM is asked to use
#   physics         — the catalog physics key (must exist in src/backends/<be>/)
#   target_pitfall  — substring that identifies the specific catalog pitfall
#                     this task tests. Used for per-pitfall ablation.
#   prompt          — natural-language task description sent to Claude
#   grade           — "compile_and_run" | "mms"
#   mms_reference?  — analytic solution + tolerance (only if grade=mms)
#   conda_env       — which env to execute the LLM output in
#   expected_substring? — string the OUTPUT (stdout / file) should contain
#   forbid_substring?   — error strings indicating failure

version: "layer_g_v0"
created: "2026-06-03"
tasks:

  - id: skfem-stokes-pressure-pin
    backend: skfem
    physics: stokes
    target_pitfall: "pressure pin"
    prompt: |
      Solve 2D Stokes flow in the unit square (0,1)x(0,1) with no-slip on
      bottom/left/right and a moving lid at the top (u=1, v=0). Use
      Taylor-Hood elements (P2 for velocity, P1 for pressure). Report
      max |u|, max |v|, and the integral of pressure. Use scikit-fem.
      Output a one-line CSV: "max_u,max_v,mean_p".
    grade: compile_and_run
    conda_env: ofa-skfem
    expected_substring: "max_u,max_v,mean_p"
    forbid_substring: "Traceback"

  - id: skfem-3d-det-jacobian
    backend: skfem
    physics: hyperelasticity
    target_pitfall: "det()"
    prompt: |
      In scikit-fem, compute the determinant of the deformation gradient
      F = I + grad(u) inside a NonlinearForm for a 3D hyperelastic problem.
      Use a unit cube mesh, apply 10% uniaxial stretch via a Dirichlet BC,
      and report the volume-averaged J = det(F). Output: "J_mean=<value>".
    grade: compile_and_run
    conda_env: ofa-skfem
    expected_substring: "J_mean="
    forbid_substring: "Traceback"

  - id: fenics-stokes-p2-output
    backend: fenics
    physics: stokes
    target_pitfall: "VTXWriter"
    prompt: |
      In dolfinx, solve 2D Stokes lid-driven cavity with mixed Taylor-Hood
      elements. Save the velocity field to disk in a format that ParaView
      can read AS HIGH-ORDER (P2), not as linearized P1. Print the path
      to the output file. The output should preserve P2 fidelity.
    grade: compile_and_run
    conda_env: ofa-fenicsx
    expected_substring: ".bp"  # VTXWriter writes ADIOS2 .bp directories
    forbid_substring: "Traceback"

  - id: fenics-nonlinear-problem-sig
    backend: fenics
    physics: hyperelasticity
    target_pitfall: "NonlinearProblem"
    prompt: |
      Set up a dolfinx NonlinearProblem for incompressible neo-Hookean
      hyperelasticity in 2D. Provide the residual F, the Jacobian J, the
      BCs, and call NewtonSolver to converge. Use the CURRENT dolfinx
      0.9+ signature. Print the number of Newton iterations.
    grade: compile_and_run
    conda_env: ofa-fenicsx
    expected_substring: "iterations"
    forbid_substring: "TypeError"

  - id: ngsolve-hyperelastic-newton
    backend: ngsolve
    physics: hyperelasticity
    target_pitfall: "Newton"
    prompt: |
      In NGSolve, set up a 3D hyperelastic uniaxial-compression test with
      a neo-Hookean material law. Apply 20% compressive displacement on
      the top face. Solve with Newton-Raphson using the standard kwargs.
      Print the final displacement at the loaded face.
    grade: compile_and_run
    conda_env: ofa-ngsolve
    expected_substring: "displacement"
    forbid_substring: "Traceback"

  - id: ngsolve-dg-poisson-jumps
    backend: ngsolve
    physics: dg_methods
    target_pitfall: "dgjumps"
    prompt: |
      Solve 2D Poisson on the unit square using interior penalty
      Discontinuous Galerkin in NGSolve. Use jumps and averages of the
      solution across element interfaces. RHS f=1, homogeneous Dirichlet
      BCs. Report the L2 norm of the solution: "u_l2=<value>".
    grade: compile_and_run
    conda_env: ofa-ngsolve
    expected_substring: "u_l2="
    forbid_substring: "Traceback"

  - id: kratos-heat-flux-neumann
    backend: kratos
    physics: heat_transfer
    target_pitfall: "HEAT_FLUX"
    prompt: |
      Set up a steady-state linear heat conduction problem in Kratos
      Multiphysics. Use LaplacianElement on a 2D unit square mesh.
      Apply a Neumann heat-flux boundary condition on the right edge
      (q = 100 W/m^2 inward). Solve and report the maximum temperature.
    grade: compile_and_run
    conda_env: ofa-kratos
    expected_substring: "TEMPERATURE"
    forbid_substring: "KratosError"

  - id: kratos-mpm-column-collapse
    backend: kratos
    physics: mpm
    target_pitfall: "MPM"
    prompt: |
      Simulate gravitational column collapse in Kratos using the Material
      Point Method (MPM). Set up the MPM application with a 2D column of
      a granular elasto-plastic material. Run 100 steps and print the
      final time + max settlement.
    grade: compile_and_run
    conda_env: ofa-kratos
    expected_substring: "time"
    forbid_substring: "KratosError"

  - id: fourc-2d-plane-strain
    backend: fourc
    physics: structural_2d
    target_pitfall: "SOLID"
    prompt: |
      Generate a 4C (FourC) input file (.4C.yaml) for a 2D plane-strain
      elasticity problem: 1m x 1m square, fixed bottom, traction on top
      edge, isotropic linear elastic E=210 GPa, nu=0.3, 10x10 mesh.
      Use the 2D element naming convention that 4C actually accepts.
    grade: compile_and_run
    conda_env: ofa-fourc
    expected_substring: "SOLID"
    forbid_substring: "ERROR"

  - id: dealii-adaptive-hanging-nodes
    backend: dealii
    physics: adaptive_refinement
    target_pitfall: "hanging_nodes"
    prompt: |
      Write a deal.II step-4-style Poisson solver with adaptive mesh
      refinement (one round of KellyErrorEstimator-driven refinement).
      Use FE_Q(1) on a 2D hyper_cube. Make sure the system matrix is
      correct on the refined mesh. Print final L2 norm of the solution.
    grade: compile_and_run
    conda_env: ofa-dealii
    expected_substring: "L2"
    forbid_substring: "ExcMessage"
