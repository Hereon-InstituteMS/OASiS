<!doctype html>
<html lang="en" class="bg-slate-950 text-slate-100">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OASiS WebUI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="https://unpkg.com/vtk.js@30.5.0/dist/vtk.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="h-screen overflow-hidden" x-data="oasisApp()" x-init="init()">

<div class="flex h-screen">

  <!-- ───────────────────────── Left: config sidebar ───────────────────────── -->
  <aside class="w-72 shrink-0 border-r border-slate-800 p-4 overflow-y-auto">
    <div class="flex items-center mb-4">
      <h1 class="text-lg font-semibold">OASiS</h1>
      <span class="ml-auto text-xs text-slate-500" x-text="session.id"></span>
    </div>

    <label class="block text-xs uppercase tracking-wider text-slate-400 mb-1">Model</label>
    <select x-model="session.model" @change="sendSet('set_model', { model: session.model })"
      class="w-full bg-slate-900 border border-slate-700 rounded px-2 py-1 mb-3">
      <template x-for="m in models" :key="m.id">
        <option :value="m.id" x-text="m.label"></option>
      </template>
    </select>

    <label class="block text-xs uppercase tracking-wider text-slate-400 mb-1">Mode</label>
    <div class="flex gap-1 mb-3">
      <template x-for="m in modes" :key="m">
        <button @click="setMode(m)"
                :class="session.mode === m ? 'bg-emerald-700' : 'bg-slate-800 hover:bg-slate-700'"
                class="flex-1 text-xs py-1 rounded capitalize" x-text="m"></button>
      </template>
    </div>

    <label class="block text-xs uppercase tracking-wider text-slate-400 mb-1">MCP servers</label>
    <template x-for="s in mcpServers" :key="s.id">
      <label class="flex items-center gap-2 text-sm mb-1">
        <input type="checkbox" :value="s.id"
               :checked="session.mcp_servers.includes(s.id)"
               @change="toggleMcp(s.id)">
        <span x-text="s.label"></span>
      </label>
    </template>

    <hr class="border-slate-800 my-4">
    <button @click="restart()" class="w-full bg-slate-800 hover:bg-rose-800 text-sm py-1 rounded mb-2">
      Restart session
    </button>
    <button @click="newSession()" class="w-full bg-slate-800 hover:bg-emerald-800 text-sm py-1 rounded mb-2">
      New session
    </button>

    <div class="mt-3 text-xs">
      <div class="flex justify-between"><span class="text-slate-400">tokens in</span>
        <span x-text="session.tokens_in"></span></div>
      <div class="flex justify-between"><span class="text-slate-400">tokens out</span>
        <span x-text="session.tokens_out"></span></div>
    </div>

    <hr class="border-slate-800 my-4">
    <div class="text-xs uppercase tracking-wider text-slate-400 mb-1">Saved sessions</div>
    <ul class="text-xs space-y-1 max-h-40 overflow-y-auto">
      <template x-for="s in savedSessions" :key="s.id">
        <li class="flex items-center gap-2">
          <button class="text-emerald-400 underline" @click="connect(s.id)" x-text="s.id"></button>
          <span class="text-slate-500" x-text="s.n_events + ' ev'"></span>
        </li>
      </template>
    </ul>
  </aside>

  <!-- ───────────────────── Main: conversation + tool tree ───────────────────── -->
  <main class="flex-1 flex flex-col min-w-0">

    <div class="border-b border-slate-800 px-4 py-2 flex items-center text-xs text-slate-400">
      <span class="mr-3">Status:</span>
      <span x-text="status"></span>
      <span class="ml-auto" x-text="connected ? '● connected' : '○ disconnected'"
            :class="connected ? 'text-emerald-400' : 'text-rose-400'"></span>
    </div>

    <div class="flex-1 overflow-y-auto p-4 space-y-3" x-ref="log">
      <template x-for="(e, i) in events" :key="i">
        <div :class="eventClass(e)" class="rounded border px-3 py-2 text-sm">
          <div class="text-xs uppercase tracking-wider opacity-70" x-text="e.type"></div>
          <pre class="whitespace-pre-wrap mt-1" x-text="formatEvent(e)"></pre>
          <template x-if="e.type === 'tool_call_pending' && session.mode === 'plan' && !e.decided">
            <div class="mt-2 flex gap-2">
              <button class="px-2 py-1 text-xs bg-emerald-700 rounded"
                      @click="approve(e)">Approve</button>
              <button class="px-2 py-1 text-xs bg-rose-700 rounded"
                      @click="reject(e)">Reject</button>
            </div>
          </template>
        </div>
      </template>
    </div>

    <div class="border-t border-slate-800 p-3">
      <div class="flex gap-2">
        <textarea x-model="prompt" rows="2" placeholder="Describe a problem…"
                  class="flex-1 bg-slate-900 border border-slate-700 rounded px-3 py-2 text-sm"
                  @keydown.ctrl.enter.prevent="send()"></textarea>
        <button @click="send()"
                class="bg-emerald-700 hover:bg-emerald-600 px-4 py-2 rounded text-sm font-medium">
          Send <span class="text-xs opacity-60">Ctrl+↵</span>
        </button>
      </div>
    </div>
  </main>

  <!-- ─────────────────── Right: files + visualisation ─────────────────── -->
  <aside class="w-96 shrink-0 border-l border-slate-800 flex flex-col">
    <div class="px-3 py-2 border-b border-slate-800 text-xs text-slate-400 flex items-center">
      <span>📂 sandbox</span>
      <span class="ml-2 text-slate-500" x-text="cwd"></span>
      <button @click="loadFiles('')" class="ml-auto text-xs underline">root</button>
    </div>

    <div class="flex-1 overflow-y-auto px-2 py-1 text-sm">
      <template x-for="e in dir.entries" :key="e.abs_path">
        <div @click="onClick(e)"
             class="cursor-pointer flex items-center gap-1 hover:bg-slate-800 rounded px-1">
          <span x-text="kindIcon(e.kind)"></span>
          <span x-text="e.name" class="truncate"></span>
          <span class="ml-auto text-xs text-slate-500" x-show="!e.is_dir"
                x-text="humanSize(e.size)"></span>
        </div>
      </template>
      <div x-show="!dir.entries || dir.entries.length === 0"
           class="text-xs text-slate-500 p-2">
        empty
      </div>
    </div>

    <div class="border-t border-slate-800 max-h-96 overflow-y-auto p-2 text-xs">
      <div x-show="!viz" class="text-slate-500 p-2">
        Click a file to visualise.
      </div>

      <template x-if="viz && viz.kind === 'text'">
        <pre class="whitespace-pre-wrap text-xs" x-text="viz.text"></pre>
      </template>

      <template x-if="viz && viz.kind === 'json'">
        <pre class="whitespace-pre-wrap text-xs" x-text="JSON.stringify(viz.obj, null, 2)"></pre>
      </template>

      <template x-if="viz && viz.kind === 'table' && viz.plot">
        <div x-ref="plotDiv" id="plotDiv" class="w-full h-64"></div>
      </template>

      <template x-if="viz && viz.kind === 'table' && !viz.plot">
        <table class="text-xs">
          <thead><tr>
            <template x-for="h in viz.header" :key="h">
              <th class="px-1 text-left" x-text="h"></th>
            </template>
          </tr></thead>
          <tbody>
            <template x-for="(row, ri) in viz.rows.slice(0, 50)" :key="ri">
              <tr><template x-for="c in row" :key="c">
                <td class="px-1" x-text="c"></td>
              </template></tr>
            </template>
          </tbody>
        </table>
      </template>

      <template x-if="viz && viz.kind === 'image'">
        <img :src="'/sandbox-file/' + viz.rel" class="max-w-full">
      </template>

      <template x-if="viz && viz.kind === 'vtk'">
        <div>
          <div class="text-emerald-400">VTK file: <span x-text="viz.name"></span></div>
          <div id="vtkRoot" class="w-full h-64 bg-slate-900 mt-2"></div>
          <div class="mt-1 text-slate-500">
            Render is delegated to vtk.js (loaded from CDN).
          </div>
        </div>
      </template>

      <template x-if="viz && viz.kind === 'hdf'">
        <div>
          <div class="text-amber-300">HDF5 file: <span x-text="viz.name"></span></div>
          <div class="text-slate-500">top-level keys:</div>
          <ul><template x-for="k in viz.keys" :key="k">
            <li class="text-xs" x-text="k"></li>
          </template></ul>
        </div>
      </template>
    </div>

    <div class="border-t border-slate-800 p-2" x-show="params.length > 0">
      <div class="text-xs uppercase tracking-wider text-slate-400 mb-1">
        Parameters in last script
      </div>
      <template x-for="p in params" :key="p.name">
        <div class="text-xs mb-1">
          <label class="flex items-center gap-2">
            <span class="w-20 truncate" x-text="p.name"></span>
            <input type="range" :min="p.min" :max="p.max" :step="p.step"
                   x-model.number="p.value" class="flex-1">
            <input type="number" x-model.number="p.value"
                   class="w-20 bg-slate-900 border border-slate-700 rounded px-1">
          </label>
        </div>
      </template>
      <button @click="rerunWithParams()"
              class="mt-1 w-full bg-emerald-700 hover:bg-emerald-600 text-xs py-1 rounded">
        Re-run with edited parameters
      </button>
    </div>

  </aside>
</div>

<script src="/static/app.js"></script>
</body>
</html>
