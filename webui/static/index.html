<!doctype html>
<html lang="en" class="bg-slate-950 text-slate-100">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OASiS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        fontFamily: {
          sans: ['Inter', 'ui-sans-serif', 'system-ui'],
          mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
        },
        colors: {
          ink: { 950: '#070a13', 900: '#0c1120', 800: '#141b2e',
                 700: '#1f2940', 600: '#2c3754', 500: '#3a4666',
                 400: '#4f5d80' },
          accent: { 400: '#60e6c8', 500: '#36cdb1', 600: '#1ba588' },
        },
        boxShadow: {
          glow: '0 0 24px -4px rgba(96, 230, 200, 0.45)',
        },
      } },
    };
  </script>
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="https://unpkg.com/vtk.js@30.5.0/dist/vtk.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="h-screen overflow-hidden font-sans" x-data="oasisApp()" x-init="init()">

<div class="flex h-screen bg-gradient-to-br from-ink-950 to-ink-900">

  <!-- ═══════════════ Left: navigator ═══════════════ -->
  <aside class="w-72 shrink-0 border-r border-ink-700/60 backdrop-blur p-5 overflow-y-auto custom-scroll">
    <div class="flex items-center gap-2 mb-6">
      <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-accent-400 to-accent-600 flex items-center justify-center font-bold text-ink-950 shadow-glow">O</div>
      <div>
        <div class="font-semibold text-slate-100">OASiS</div>
        <div class="text-[10px] uppercase tracking-widest text-slate-500">simulation workbench</div>
      </div>
    </div>

    <div class="text-[10px] uppercase tracking-widest text-slate-500 mb-1.5">Session</div>
    <div class="font-mono text-xs text-slate-400 mb-4" x-text="session.id || '—'"></div>

    <!-- Model -->
    <label class="text-[10px] uppercase tracking-widest text-slate-500 block mb-1.5">Model</label>
    <div class="relative mb-4">
      <select x-model="session.model" @change="sendSet('set_model', { model: session.model })"
        class="w-full appearance-none bg-ink-800/80 border border-ink-700 rounded-lg px-3 py-2 text-sm focus:border-accent-500 focus:outline-none">
        <template x-for="m in models" :key="m.id">
          <option :value="m.id" x-text="m.label"></option>
        </template>
      </select>
      <svg class="w-4 h-4 absolute right-2.5 top-2.5 pointer-events-none text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
    </div>

    <!-- Mode -->
    <label class="text-[10px] uppercase tracking-widest text-slate-500 block mb-1.5">Mode</label>
    <div class="grid grid-cols-3 gap-1 mb-4 bg-ink-800/60 p-1 rounded-lg">
      <template x-for="m in modes" :key="m">
        <button @click="setMode(m)"
                :class="session.mode === m
                  ? 'bg-gradient-to-r from-accent-500 to-accent-600 text-ink-950 shadow-glow font-semibold'
                  : 'text-slate-400 hover:text-slate-100'"
                class="text-xs py-1.5 rounded-md capitalize transition-all" x-text="m"></button>
      </template>
    </div>

    <!-- MCP servers -->
    <label class="text-[10px] uppercase tracking-widest text-slate-500 block mb-1.5">MCP servers</label>
    <div class="space-y-1.5 mb-4">
      <template x-for="s in mcpServers" :key="s.id">
        <label class="flex items-center gap-2 text-sm bg-ink-800/60 hover:bg-ink-800 px-2.5 py-1.5 rounded-lg cursor-pointer">
          <input type="checkbox"
                 :checked="session.mcp_servers.includes(s.id)"
                 @change="toggleMcp(s.id)"
                 class="accent-accent-500">
          <span x-text="s.label" class="truncate text-xs"></span>
        </label>
      </template>
    </div>

    <!-- Actions -->
    <div class="grid grid-cols-2 gap-2 mb-4">
      <button @click="restart()"
              class="text-xs py-2 rounded-lg bg-ink-800 hover:bg-rose-900/60 border border-ink-700 transition-all">
        Restart
      </button>
      <button @click="newSession()"
              class="text-xs py-2 rounded-lg bg-ink-800 hover:bg-accent-600/30 border border-ink-700 transition-all">
        New
      </button>
    </div>

    <!-- Token counter -->
    <div class="mb-4 bg-ink-800/40 rounded-xl p-3 border border-ink-700/60">
      <div class="text-[10px] uppercase tracking-widest text-slate-500 mb-1">Tokens</div>
      <div class="flex items-baseline justify-between text-sm">
        <span class="text-slate-400">in</span>
        <span class="font-mono text-slate-100" x-text="session.tokens_in"></span>
      </div>
      <div class="flex items-baseline justify-between text-sm">
        <span class="text-slate-400">out</span>
        <span class="font-mono text-slate-100" x-text="session.tokens_out"></span>
      </div>
    </div>

    <!-- Past sessions -->
    <div class="text-[10px] uppercase tracking-widest text-slate-500 mb-1.5">Recent sessions</div>
    <ul class="space-y-1 max-h-44 overflow-y-auto custom-scroll text-xs">
      <template x-for="s in savedSessions" :key="s.id">
        <li>
          <button class="w-full text-left flex items-center gap-2 px-2 py-1 rounded-md hover:bg-ink-800/80"
                  :class="s.id === session.id ? 'bg-ink-800/80 text-accent-400' : 'text-slate-400'"
                  @click="connect(s.id)">
            <span class="font-mono truncate" x-text="s.id"></span>
            <span class="ml-auto text-slate-600" x-text="s.n_events + ' ev'"></span>
          </button>
        </li>
      </template>
    </ul>
  </aside>

  <!-- ═══════════════ Centre: chat + tool tree ═══════════════ -->
  <main class="flex-1 flex flex-col min-w-0">

    <!-- Header -->
    <div class="px-6 py-3 border-b border-ink-700/60 flex items-center gap-3 backdrop-blur">
      <div class="w-2 h-2 rounded-full" :class="connected ? 'bg-accent-400 animate-pulse' : 'bg-rose-500'"></div>
      <div class="text-sm">
        <span class="text-slate-300" x-text="connected ? 'Connected' : 'Disconnected'"></span>
        <span class="text-slate-500 ml-2" x-text="status"></span>
      </div>
      <div class="ml-auto flex items-center gap-3 text-xs">
        <span class="px-2 py-1 rounded-md bg-ink-800 text-slate-400 capitalize" x-text="session.mode + ' mode'"></span>
        <span class="px-2 py-1 rounded-md bg-ink-800 text-slate-400" x-text="session.model"></span>
      </div>
    </div>

    <!-- Conversation -->
    <div class="flex-1 overflow-y-auto custom-scroll px-6 py-5 space-y-3" x-ref="log">
      <template x-for="(e, i) in events" :key="i">
        <div :class="bubbleClass(e)" class="rounded-xl border px-4 py-3 max-w-3xl text-sm shadow-sm">
          <div class="flex items-center gap-2 text-[10px] uppercase tracking-widest opacity-80 mb-1">
            <span x-text="eventIcon(e)" class="text-base"></span>
            <span x-text="eventLabel(e)" class="font-semibold"></span>
            <span class="ml-auto opacity-60 font-mono normal-case" x-show="e.call_id || e.sa_id" x-text="(e.call_id || e.sa_id || '')"></span>
          </div>
          <pre class="whitespace-pre-wrap font-sans" x-text="formatEvent(e)"></pre>

          <template x-if="e.type === 'tool_call_pending' && session.mode === 'plan' && !e.decided">
            <div class="mt-3 flex gap-2">
              <button class="px-3 py-1.5 text-xs rounded-lg bg-gradient-to-r from-accent-500 to-accent-600 text-ink-950 font-semibold shadow-glow hover:brightness-110"
                      @click="approve(e)">Approve</button>
              <button class="px-3 py-1.5 text-xs rounded-lg bg-rose-700 hover:bg-rose-600 text-white"
                      @click="reject(e)">Reject</button>
            </div>
          </template>
        </div>
      </template>
      <div x-show="events.length === 0" class="text-slate-500 text-sm text-center py-12">
        <div class="text-4xl mb-3 opacity-50">○</div>
        <div>Describe a simulation problem to start.</div>
        <div class="text-xs mt-1 opacity-70">⌃↵ to send · click Approve in plan mode</div>
      </div>
    </div>

    <!-- Prompt -->
    <div class="border-t border-ink-700/60 px-6 py-4 backdrop-blur">
      <div class="flex gap-2 bg-ink-800/80 rounded-xl border border-ink-700 px-3 py-2 focus-within:border-accent-500 transition-all">
        <textarea x-model="prompt" rows="2"
                  placeholder="e.g. solve 2D Poisson with a manufactured solution and report L2 rates… (Enter to send, Shift+Enter for newline)"
                  class="flex-1 bg-transparent border-none focus:outline-none text-sm placeholder-slate-600 resize-none"
                  @keydown.enter="if (!$event.shiftKey) { $event.preventDefault(); send() }"></textarea>
        <button @click="send()"
                :disabled="!prompt.trim() || !connected"
                class="self-end px-4 py-2 rounded-lg bg-gradient-to-r from-accent-500 to-accent-600 text-ink-950 font-semibold text-sm shadow-glow hover:brightness-110 disabled:opacity-40 disabled:cursor-not-allowed disabled:shadow-none transition-all">
          Send
        </button>
      </div>
    </div>
  </main>

  <!-- ═══════════════ Right: files + viz ═══════════════ -->
  <aside class="w-[28rem] shrink-0 border-l border-ink-700/60 flex flex-col backdrop-blur">

    <div class="px-4 py-3 border-b border-ink-700/60 flex items-center gap-2">
      <span class="text-base">📂</span>
      <span class="text-sm font-medium">Sandbox</span>
      <span class="text-xs font-mono text-slate-500 truncate" x-text="cwd"></span>
      <button @click="loadFiles('')"
              class="ml-auto text-xs px-2 py-1 rounded-md bg-ink-800 hover:bg-ink-700 text-slate-400">root</button>
    </div>

    <div class="overflow-y-auto custom-scroll px-2 py-2 text-sm flex-1 min-h-0">
      <template x-for="e in dir.entries" :key="e.abs_path">
        <div @click="onClick(e)"
             class="cursor-pointer flex items-center gap-2 hover:bg-ink-800/80 rounded-md px-2 py-1 text-xs">
          <span class="text-base shrink-0" x-text="kindIcon(e.kind)"></span>
          <span x-text="e.name" class="truncate" :class="e.is_dir ? 'text-slate-200 font-medium' : 'text-slate-300'"></span>
          <span class="ml-auto text-slate-600 font-mono" x-show="!e.is_dir" x-text="humanSize(e.size)"></span>
        </div>
      </template>
      <div x-show="!dir.entries || dir.entries.length === 0"
           class="text-xs text-slate-600 p-3 italic">empty</div>
    </div>

    <!-- Viz pane -->
    <div class="border-t border-ink-700/60 flex flex-col min-h-0">
      <div x-show="!viz" class="text-slate-600 p-4 text-xs italic">
        Click a file to inspect it.
      </div>

      <div x-show="viz" class="px-3 py-2 border-b border-ink-700/60 flex items-center gap-2 text-xs">
        <span x-text="viz && kindIcon(viz.kind)" class="text-base"></span>
        <span class="font-mono text-slate-400 truncate" x-text="viz && (viz.rel || viz.path || viz.name || '')"></span>
      </div>

      <div class="overflow-y-auto custom-scroll p-3 text-xs max-h-[26rem]">

        <template x-if="viz && viz.kind === 'text'">
          <div>
            <div class="flex items-center gap-2 mb-2">
              <button @click="editMode = !editMode"
                      class="text-xs px-2.5 py-1 rounded-md border border-ink-700 hover:border-accent-500 transition-all"
                      x-text="editMode ? 'Cancel' : '✎ Edit'"></button>
              <button x-show="editMode" @click="saveFile()"
                      class="text-xs px-2.5 py-1 rounded-md bg-gradient-to-r from-accent-500 to-accent-600 text-ink-950 font-semibold">
                Save
              </button>
              <span class="text-xs text-slate-500 ml-auto" x-show="viz.truncated">preview only</span>
              <span class="text-xs text-accent-400" x-show="saveStatus" x-text="saveStatus"></span>
            </div>
            <pre x-show="!editMode" class="font-mono text-[11px] leading-snug whitespace-pre-wrap bg-ink-900 border border-ink-800 rounded-lg p-3" x-text="viz.text"></pre>
            <textarea x-show="editMode" x-model="viz.text" rows="22"
                      class="w-full bg-ink-900 border border-accent-500/40 rounded-lg p-3 text-[11px] font-mono focus:border-accent-500 focus:outline-none"></textarea>
          </div>
        </template>

        <template x-if="viz && viz.kind === 'json'">
          <pre class="font-mono text-[11px] leading-snug whitespace-pre-wrap bg-ink-900 border border-ink-800 rounded-lg p-3" x-text="JSON.stringify(viz.obj, null, 2)"></pre>
        </template>

        <template x-if="viz && viz.kind === 'table' && viz.plot">
          <div>
            <div class="flex items-center gap-2 mb-2 text-xs">
              <span class="text-slate-500">Plot</span>
              <button @click="exportPlot('png')"
                      class="px-2 py-0.5 rounded-md bg-ink-800 hover:bg-ink-700">
                PNG
              </button>
              <button @click="exportPlot('svg')"
                      class="px-2 py-0.5 rounded-md bg-ink-800 hover:bg-ink-700">
                SVG
              </button>
              <span class="ml-auto text-slate-600 italic">click titles &amp; axes to edit</span>
            </div>
            <div x-ref="plotDiv" id="plotDiv" class="w-full h-72 bg-ink-900 border border-ink-800 rounded-lg"></div>
          </div>
        </template>

        <template x-if="viz && viz.kind === 'table' && !viz.plot">
          <table class="text-[11px]">
            <thead><tr class="text-slate-500 uppercase tracking-wider text-[10px]">
              <template x-for="h in viz.header" :key="h">
                <th class="px-2 py-1 text-left border-b border-ink-700" x-text="h"></th>
              </template>
            </tr></thead>
            <tbody>
              <template x-for="(row, ri) in viz.rows.slice(0, 80)" :key="ri">
                <tr class="hover:bg-ink-800/40">
                  <template x-for="c in row" :key="c">
                    <td class="px-2 py-1 font-mono" x-text="c"></td>
                  </template>
                </tr>
              </template>
            </tbody>
          </table>
        </template>

        <template x-if="viz && viz.kind === 'image'">
          <img :src="'/sandbox-file/' + viz.rel"
               class="max-w-full rounded-lg border border-ink-800">
        </template>

        <template x-if="viz && viz.kind === 'vtk'">
          <div>
            <div class="flex items-center gap-2 mb-2 text-xs">
              <span class="text-accent-400">Mesh / VTK</span>
              <span class="font-mono text-slate-500" x-text="viz.name"></span>
              <button @click="resetVtkCamera()"
                      class="ml-auto px-2 py-0.5 rounded-md bg-ink-800 hover:bg-ink-700">Reset</button>
              <button @click="saveVtkScreenshot()"
                      class="px-2 py-0.5 rounded-md bg-ink-800 hover:bg-ink-700">PNG</button>
            </div>
            <div id="vtkRoot" class="w-full h-72 bg-ink-900 border border-ink-800 rounded-lg"></div>
            <div class="mt-2 flex items-center gap-2 text-xs">
              <label class="text-slate-500">Scalar range</label>
              <input type="number" x-model.number="vtkRange[0]" step="0.01"
                     class="w-20 bg-ink-900 border border-ink-700 rounded px-2 py-0.5 font-mono">
              <span class="text-slate-600">…</span>
              <input type="number" x-model.number="vtkRange[1]" step="0.01"
                     class="w-20 bg-ink-900 border border-ink-700 rounded px-2 py-0.5 font-mono">
              <button @click="applyVtkRange()"
                      class="ml-auto px-2 py-0.5 rounded-md bg-accent-600/30 hover:bg-accent-600/60 border border-accent-500/40">Apply</button>
            </div>
          </div>
        </template>

        <template x-if="viz && viz.kind === 'hdf'">
          <div>
            <div class="text-amber-300 mb-1">HDF5: <span x-text="viz.name"></span></div>
            <div class="text-slate-500 mb-2">datasets:</div>
            <ul class="space-y-0.5 font-mono">
              <template x-for="k in viz.keys" :key="k">
                <li class="text-slate-300" x-text="k"></li>
              </template>
            </ul>
          </div>
        </template>
      </div>

      <!-- Parameter sliders -->
      <div class="border-t border-ink-700/60 p-3" x-show="params.length > 0">
        <div class="flex items-center gap-2 mb-2 text-xs">
          <span class="text-[10px] uppercase tracking-widest text-slate-500">Script parameters</span>
          <span class="text-slate-600" x-text="'(' + params.length + ')'"></span>
        </div>
        <template x-for="p in params" :key="p.name">
          <div class="text-xs mb-1.5">
            <label class="flex items-center gap-2">
              <span class="w-20 truncate font-mono text-slate-300" x-text="p.name"></span>
              <input type="range" :min="p.min" :max="p.max" :step="p.step"
                     x-model.number="p.value" class="flex-1 accent-accent-500">
              <input type="number" x-model.number="p.value" :step="p.step"
                     class="w-20 bg-ink-900 border border-ink-700 rounded px-2 py-0.5 font-mono">
            </label>
          </div>
        </template>
        <button @click="rerunWithParams()"
                class="mt-2 w-full bg-gradient-to-r from-accent-500 to-accent-600 text-ink-950 font-semibold text-xs py-2 rounded-lg shadow-glow hover:brightness-110">
          Re-run with edited values
        </button>
      </div>
    </div>
  </aside>
</div>

<script src="/static/app.js"></script>
</body>
</html>
